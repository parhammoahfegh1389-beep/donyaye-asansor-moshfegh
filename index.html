<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>دنیای آسانسور مشفق</title>

<style>
body{
margin:0;
font-family:tahoma;
background:#07121f;
color:white;
}

header{
padding:25px;
text-align:center;
background:#0d1b2a;
border-bottom:2px solid gold;
}

header h1{
margin:0;
color:gold;
}

.hero{
padding:60px 20px;
text-align:center;
}

.hero h2{
font-size:32px;
margin-bottom:15px;
}

.hero p{
color:#ccc;
}

.btn{
display:inline-block;
margin-top:20px;
padding:12px 25px;
background:gold;
color:black;
text-decoration:none;
border-radius:8px;
font-weight:bold;
}

.products{
padding:30px 20px;
}

.products h3{
text-align:center;
color:gold;
}

.card{
background:#10233b;
padding:20px;
margin:15px 0;
border-radius:12px;
border:1px solid rgba(255,215,0,.3);
}

footer{
text-align:center;
padding:25px;
margin-top:40px;
background:#0d1b2a;
}
</style>

</head>

<body>

<header>
<h1>دنیای آسانسور مشفق</h1>
</header>

<section class="hero">
<h2>تامین تخصصی قطعات آسانسور</h2>
<p>عرضه انواع موتور، تابلو فرمان، ریل، سیم بکسل و تجهیزات آسانسور</p>

<a href="#" class="btn">
مشاهده محصولات
</a>
</section>

<section class="products">

<h3>محصولات اصلی</h3>

<div class="card">
<h4>موتور آسانسور</h4>
<p>انواع موتورهای کششی و گیربکس</p>
</div>

<div class="card">
<h4>تابلو فرمان</h4>
<p>تابلوهای مدرن و هوشمند آسانسور</p>
</div>

<div class="card">
<h4>ریل و سیم بکسل</h4>
<p>تجهیزات استاندارد و باکیفیت</p>
</div>

</section>

<footer>
دنیای آسانسور مشفق
</footer>

</body>
</html>
